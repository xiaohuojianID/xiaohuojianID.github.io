<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="theme-color" content="#0a1628">

    {%- seo -%}

    {%- if page.keywords -%}
    <meta name="keywords" content="{{ page.keywords }}">
    {%- endif -%}

    <link rel="canonical" href="{{ page.url | absolute_url }}">

    {%- feed_meta -%}

    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
    <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">

    <!-- Google Fonts: Noto Sans SC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (预编译) -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>

    {%- if page.custom_css -%}
        <link rel="stylesheet" href="{{ page.custom_css | relative_url }}">
    {%- endif -%}

    <!-- JSON-LD Breadcrumb -->
    {%- if page.breadcrumb -%}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            {"@type": "ListItem", "position": 1, "name": "首页", "item": "{{ '/' | absolute_url }}"}
            {%- for crumb in page.breadcrumb -%}
            ,{"@type": "ListItem", "position": {{ forloop.index | plus: 1 }}, "name": "{{ crumb.name }}", "item": "{{ crumb.url | absolute_url }}"}
            {%- endfor -%}
        ]
    }
    </script>
    {%- endif -%}

    <!-- JSON-LD Site Search -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "{{ '/' | absolute_url }}",
        "potentialAction": {
            "@type": "SearchAction",
            "target": {
                "@type": "EntryPoint",
                "urlTemplate": "{{ '/?s=' | absolute_url }}{search_term_string}"
            },
            "query-input": "required name=search_term_string"
        }
    }
    </script>
 <!-- 弹窗样式与脚本开始 -->
<style>
  #popupOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 10px;
    box-sizing: border-box;
  }
  
  #popupOverlay.show {
    display: flex;
  }
  
  .popup-content {
    background: #fff;
    padding: 20px 30px;
    border-radius: 12px;
    max-width: 100%;
    width: 370px;
    text-align: center;
    position: relative;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    box-sizing: border-box;
    max-height: 90vh;
    overflow-y: auto;
  }
  
  .popup-close-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.05);
    border: none;
    font-size: 20px;
    font-weight: bold;
    color: #999;
    cursor: pointer;
    transition: all 0.3s;
    flex-shrink: 0;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    z-index: 10;
  }
  
  .popup-close-btn:hover {
    background: #f44336;
    color: #fff;
  }
  
  .popup-link {
    text-decoration: none;
    color: inherit;
    display: block;
  }
  
  .popup-title {
    margin: 0 0 10px;
    font-size: 24px;
    font-weight: bold;
    color: #ff4d4f;
    word-wrap: break-word;
  }
  
  .popup-image {
    width: 100%;
    max-width: 300px;
    height: auto;
    display: block;
    margin: 0 auto 15px;
    border-radius: 8px;
  }

  .popup-shop-btn {
    display: inline-block;
    width: 100%;
    background: #e11d48;
    color: #fff;
    font-weight: bold;
    padding: 12px 1px;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.3s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .popup-shop-btn:hover {
    background: #be123c;
  }
  
  /* 移动端适配 */
  @media (max-width: 768px) {
    .popup-content {
      width: 95%;
      max-width: 320px;
      padding: 15px 20px;
    }
    
    .popup-title {
      font-size: 20px;
    }
    
    .popup-close-btn {
      width: 28px;
      height: 28px;
      font-size: 18px;
    }
  }
</style>

<!-- 弹窗 HTML 结构 -->
<div id="popupOverlay">
  <div class="popup-content">
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <!-- 推荐链接 -->
      <a href="https://ml.yfqz1.net/register?code=PCC6A3bC" target="_blank" class="popup-link">
        <p class="popup-title">Clash 机场推荐</p>
        <img src="https://free.picui.cn/free/2026/06/05/6a229370bf0c1.png" alt="机场地址" class="popup-image">
      </a>
      
      <!-- 分割线 -->
      <div style="border-top: 1px solid #f3f4f6; padding-top: 1rem;">
        <a href="http://shop.xinkonyun.cc/" target="_blank" class="popup-shop-btn">
          🛒 购买 Shadowrocket 独享账号/海外其他账号
        </a>
      </div>
    </div>
    
    <!-- 关闭按钮 -->
    <button class="popup-close-btn" id="popupCloseBtn" aria-label="关闭">&times;</button>
  </div>
</div>

<!-- 弹窗控制脚本 -->
<script>
  (function() {
    const popupOverlay = document.getElementById('popupOverlay');
    const popupCloseBtn = document.getElementById('popupCloseBtn');
    
    // 页面加载完成后显示弹窗
    window.addEventListener('DOMContentLoaded', function() {
      // 延迟 500ms 显示，效果更自然
      setTimeout(() => {
        popupOverlay.classList.add('show');
      }, 500);
    });
    
    // 关闭按钮点击事件
    popupCloseBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      popupOverlay.classList.remove('show');
    });
    
    // 点击遮罩层不关闭（强制引导），如需点击遮罩关闭可取消下面注释
    /*
    popupOverlay.addEventListener('click', function(e) {
      if (e.target === popupOverlay) {
        popupOverlay.classList.remove('show');
      }
    });
    */
  })();
</script>
<!-- 弹窗样式与脚本结束 -->   
</head>
<body class="bg-white dark:bg-[#0a1628] text-gray-900 dark:text-gray-100 font-sans antialiased transition-colors duration-300" x-data="{ darkMode: localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches) }" x-init="$watch('darkMode', val => { document.documentElement.classList.toggle('dark', val); localStorage.setItem('theme', val ? 'dark' : 'light') })" :class="{ 'dark': darkMode }">
