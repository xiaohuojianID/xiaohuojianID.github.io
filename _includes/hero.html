      <line x1="750" y1="220" x2="680" y2="320" stroke="rgba(255,255,255,0.12)" stroke-width="0.5" class="hero-line"/>

  <!-- Gradient Overlay -->
  <div class="absolute inset-0 bg-gradient-to-b from-transparent via-blue-700/30 to-blue-900/60 pointer-events-none"></div>

  <!-- Decorative circles -->
  <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-blue-400/20 rounded-full blur-3xl animate-pulse"></div>
  <div class="absolute bottom-1/3 right-1/4 w-80 h-80 bg-indigo-400/20 rounded-full blur-3xl animate-pulse animation-delay-2000"></div>

  <!-- Content -->
  <div class="relative z-10 text-center px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto">
    <!-- Badge -->
    <div class="inline-block mb-6" data-gsap="fade-up" data-gsap-delay="0.1">
      <span class="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-medium bg-white/15 text-white backdrop-blur-sm border border-white/20">
        <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span>
        精选高性价比机场推荐
      </span>

    <!-- Title -->
    <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-extrabold text-white mb-6 leading-tight" data-gsap="fade-up" data-gsap-delay="0.2">
      一元机场导航

    <!-- Subtitle -->
    <p class="text-lg sm:text-xl md:text-2xl text-blue-100/90 mb-10 max-w-2xl mx-auto leading-relaxed" data-gsap="fade-up" data-gsap-delay="0.3">

    </p>

    <!-- CTA Buttons -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4" data-gsap="fade-up" data-gsap-delay="0.4">
      <a href="{{ site.baseurl }}/airports/" class="group relative inline-flex items-center px-8 py-4 bg-white text-blue-700 font-bold text-lg rounded-xl hover:bg-blue-50 transition-all duration-300 shadow-xl hover:shadow-2xl hover:-translate-y-0.5 overflow-hidden">
        <span class="relative z-10">立即查看机场</span>
        <svg class="relative z-10 w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
      </a>
      <a href="{{ site.baseurl }}/tutorials/" class="inline-flex items-center px-8 py-4 border-2 border-white/40 text-white font-bold text-lg rounded-xl hover:bg-white/10 hover:border-white/60 transition-all duration-300 backdrop-blur-sm">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        阅读教程
      </a>
    </div>

    <!-- Scroll indicator -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-bounce" data-gsap="fade-in" data-gsap-delay="0.8">
      <svg class="w-6 h-6 text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
    </div>
