---
layout: default
---
<article class="max-w-4xl mx-auto px-4 py-12">
  <header class="mb-10">
    <nav class="flex text-sm text-gray-500 dark:text-gray-400 mb-6" aria-label="Breadcrumb">
      <a href="/" class="hover:text-brand-600 dark:hover:text-brand-400">首页</a>
      <span class="mx-2">›</span>
      <span class="text-gray-900 dark:text-gray-100">{{ page.title }}</span>
    </nav>
    <h1 class="text-3xl md:text-4xl font-bold mb-4">{{ page.title }}</h1>
    {% if page.description %}
    <p class="text-lg text-gray-600 dark:text-gray-400">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="prose prose-lg dark:prose-invert max-w-none prose-headings:text-gray-900 dark:prose-headings:text-gray-100 prose-a:text-brand-600 dark:prose-a:text-brand-400 prose-img:rounded-xl prose-table:overflow-x-auto">
    {{ content }}
  </div>

  {% if page.show_cta %}
  <div class="mt-16 bg-gradient-to-r from-brand-600 to-accent-600 rounded-2xl p-8 md:p-12 text-center text-white">
    <h2 class="text-2xl md:text-3xl font-bold mb-4">还有疑问？</h2>
    <p class="text-lg text-white/80 mb-6 max-w-xl mx-auto">查看我们的完整教程和常见问题，或联系我们获取帮助。</p>
    <div class="flex flex-wrap justify-center gap-4">
      <a href="/tutorial/" class="inline-block px-8 py-3 bg-white text-brand-700 font-semibold rounded-xl hover:shadow-lg transition-shadow">查看教程</a>
      <a href="/faq/" class="inline-block px-8 py-3 border-2 border-white/40 text-white font-semibold rounded-xl hover:bg-white/10 transition-colors">常见问题</a>
    </div>
  </div>
  {% endif %}
</article>
